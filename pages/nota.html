<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nota Laundry</title>

<link rel="stylesheet" href="../css/nota.css">

</head>

<body>

<div class="nota-container">

    <div class="header">

        <h1>HINENI LAUNDRY</h1>
        <p>Semarang</p>
        <p>WA 0812-xxxx-xxxx</p>

        <p>
            Laundry Cepat • Bersih • Wangi
        </p>

    </div>

    <div class="line"></div>

<div class="row">
    <span>Nota</span>
    <strong id="kode"></strong>
</div>

<div class="row">
    <span>Tanggal</span>
    <strong id="tanggal"></strong>
</div>

<div class="row">
    <span>Pelanggan</span>
    <strong id="pelanggan"></strong>
</div>

<div class="line"></div>

<div class="row">
    <span>Layanan</span>
    <strong id="layanan"></strong>
</div>

<div class="row">
    <span>Berat</span>
    <strong id="berat"></strong>
</div>

<div class="row">
    <span>Status</span>
    <strong id="statusBadge"></strong>
</div>

    <div class="total-box">

        <span>Total Pembayaran</span>

        <h2 id="total"></h2>

    </div>

    <div class="footer">

        <p>
            Terima kasih telah menggunakan
            layanan kami.
        </p>

        <p>
            Kami siap melayani Anda kembali.
        </p>

    </div>

    <button
    class="btn-print"
    onclick="window.print()">

    Cetak Nota

    </button>

</div>

<script src="../js/nota.js"></script>

</body>
</html>
