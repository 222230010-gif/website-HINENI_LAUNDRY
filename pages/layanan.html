<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Layanan | Hineni Laundry</title>

    <link rel="stylesheet" href="../css/components/sidebar.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/layanan.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >
</head>

<body>

<div class="layout">

    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">

        <section class="page-header">
            <div>
                <h1>Manajemen Layanan</h1>
                <p>
                    Kelola seluruh layanan laundry beserta harga dan satuan yang digunakan pada transaksi.
                </p>
            </div>

            <div class="page-header-actions">
                <button
                    type="button"
                    class="btn btn-primary"
                    id="btnOpenModal"
                >
                    <i class="fas fa-plus"></i>
                    Tambah Layanan
                </button>
            </div>
        </section>

        <section class="summary-grid">

            <article class="summary-card">
                <div class="summary-icon blue">
                    <i class="fas fa-soap"></i>
                </div>

                <div class="summary-info">
                    <span>Total Layanan</span>
                    <h3 id="totalLayanan">0</h3>
                </div>
            </article>

            <article class="summary-card">
                <div class="summary-icon green">
                    <i class="fas fa-money-bill-wave"></i>
                </div>

                <div class="summary-info">
                    <span>Rata-rata Harga</span>
                    <h3 id="avgHarga">Rp 0</h3>
                </div>
            </article>

        </section>

        <section class="content-card">

            <div class="card-header">
                <div>
                    <h2>Daftar Layanan</h2>
                    <p>Kelola layanan laundry yang tersedia.</p>
                </div>
            </div>

            <div class="table-responsive">

                <table class="data-table">

                    <thead>
                        <tr>
                            <th>ID Layanan</th>
                            <th>Jenis Layanan</th>
                            <th>Satuan</th>
                            <th>Harga</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="layananTableBody">
                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<!-- MODAL -->

<div class="modal-overlay" id="layananModal">

    <div class="modal-box">

        <div class="modal-header">

            <div>
                <h3 id="modalTitle">Tambah Layanan</h3>
                <p>Isi data layanan laundry.</p>
            </div>

            <button
                type="button"
                class="icon-btn ghost"
                id="btnCloseModal"
            >
                <i class="fas fa-xmark"></i>
            </button>

        </div>

        <form id="layananForm" class="modal-form">

            <div class="form-grid two-col">

                <div class="form-group">
                    <label>ID Layanan</label>
                    <input
                        type="text"
                        id="idLayanan"
                        class="input-control"
                        readonly
                    >
                </div>

                <div class="form-group">
                    <label>Satuan</label>
                    <select
                        id="satuan"
                        class="input-control"
                        required
                    >
                        <option value="kg">Kg</option>
                        <option value="pcs">Pcs</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jenis Layanan</label>
                    <input
                        type="text"
                        id="jenisLayanan"
                        class="input-control"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Harga per Satuan</label>
                    <input
                        type="number"
                        id="harga"
                        class="input-control"
                        required
                    >
                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-light"
                    id="btnCancelModal"
                >
                    Batal
                </button>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    <i class="fas fa-save"></i>
                    Simpan Layanan
                </button>

            </div>

        </form>

    </div>

</div>

<script src="../js/app.js"></script>
<script src="../js/layanan.js"></script>

</body>
</html>
