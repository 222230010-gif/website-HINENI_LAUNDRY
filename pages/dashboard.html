<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hineni Laundry</title>

    <link rel="stylesheet" href="../css/components/sidebar.css">
    <link rel="stylesheet" href="../css/dashboard.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main">

        <div class="topbar">

            <div>
                <h1>Dashboard</h1>
            </div>

            <div class="profile">
                <i class="fas fa-user-circle"></i>
                <span id="namaLogin">User</span>
            </div>

        </div>

        <!-- CARD -->

        <section class="stats">

            <div class="card">
                <div>
                    <h4>Pendapatan Hari Ini</h4>
                    <h2 id="pendapatanHariIni">Rp 0</h2>
                    <small id="infoPendapatan">
                        0 transaksi lunas hari ini
                    </small>
                </div>

                <div class="icon green">
                    <i class="fas fa-money-bill-wave"></i>
                </div>
            </div>

            <div class="card">
                <div>
                    <h4>Total Transaksi Hari Ini</h4>
                    <h2 id="totalTransaksi">0</h2>
                </div>

                <div class="icon purple">
                    <i class="fas fa-receipt"></i>
                </div>
            </div>

            <div class="card">
                <div>
                    <h4>Total Pelanggan</h4>
                    <h2 id="totalPelanggan">0</h2>
                </div>

                <div class="icon blue">
                    <i class="fas fa-users"></i>
                </div>
            </div>

            <div class="card">
                <div>
                    <h4>Pendapatan Bulan Ini</h4>
                    <h2 id="pendapatanBulan">Rp 0</h2>

                    <small id="infoPendapatanBulan">
                        0 transaksi lunas bulan ini
                    </small>
                </div>

                <div class="icon orange">
                    <i class="fas fa-chart-line"></i>
                </div>
            </div>

        </section>

        <section class="content-grid">

            <div class="box">

                <div class="box-header grafik-header">

                    <h3>Grafik Pendapatan</h3>

                    <select id="filterGrafik">
                        <option value="hari">Hari Ini</option>
                        <option value="minggu" selected>Minggu Ini</option>
                        <option value="bulan">Bulan Ini</option>
                        <option value="tahun">Tahun Ini</option>
                    </select>

                </div>

                <canvas id="incomeChart"></canvas>

            </div>

            <div class="box">

                <div class="box-header">
                    <h3>Transaksi Terbaru</h3>
                </div>

                <table>

                    <thead>
                        <tr>
                            <th>Pelanggan</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="transaksiTerbaru"></tbody>

                </table>

            </div>

        </section>

    </main>

    <script src="../js/dashboard.js"></script>
    <script src="../js/app.js"></script>

</body>
</html>
